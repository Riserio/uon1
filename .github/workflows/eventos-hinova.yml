name: Eventos Hinova - Importação de Eventos
run-name: "Eventos ${{ inputs.execucao_id || 'agendado' }} · ${{ inputs.corretora_id || 'todas' }}"

on:
  # Agendamento: dias úteis às 09:00 (horário de Brasília = 12:00 UTC)
  schedule:
    - cron: '0 12 * * 1-5'
  
  # Permite execução manual pelo GitHub ou via API
  workflow_dispatch:
    inputs:
      corretora_id:
        description: 'ID da corretora/associação'
        required: false
        type: string
      data_inicio:
        description: 'Data inicial (DD/MM/YYYY) - padrão: 1º dia do mês'
        required: false
        type: string
      data_fim:
        description: 'Data final (DD/MM/YYYY) - padrão: último dia do mês'
        required: false
        type: string
      execucao_id:
        description: 'ID da execução no banco'
        required: false
        type: string
      webhook_url:
        description: 'URL do webhook para callback'
        required: false
        type: string

jobs:
  importar-eventos:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Dependências do robô ISOLADAS do app (evita instalar a árvore inteira
      # do frontend e falhas de setup quando o package-lock do app muda)
      - name: Cache dependências do robô
        uses: actions/cache@v4
        id: robot-cache
        with:
          path: .robot-deps/node_modules
          key: ${{ runner.os }}-robot-deps-playwright-1.49.1-v2

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-1.49.1-v2

      - name: Instalar dependências do robô (com retry)
        if: steps.robot-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .robot-deps && cd .robot-deps
          [ -f package.json ] || echo '{"name":"robot-deps","private":true}' > package.json
          for i in 1 2 3; do
            npm install --no-audit --no-fund playwright@1.49.1 axios xlsx && break
            echo "npm install falhou (tentativa $i), aguardando..." && sleep 20
            [ "$i" = "3" ] && exit 1
          done

      - name: Instalar Playwright Chromium (com retry)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          cd .robot-deps
          for i in 1 2 3; do
            npx playwright install chromium --with-deps && break
            echo "playwright install falhou (tentativa $i), aguardando..." && sleep 20
            [ "$i" = "3" ] && exit 1
          done

      - name: Instalar dependências do sistema (se browser em cache)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: |
          cd .robot-deps
          for i in 1 2 3; do
            npx playwright install-deps chromium && break
            echo "install-deps falhou (tentativa $i), aguardando..." && sleep 20
            [ "$i" = "3" ] && exit 1
          done
      
      - name: Executar robô de eventos
        env:
          CREDENTIALS_URL: ${{ secrets.CREDENTIALS_URL }}
          ROBOT_SECRET: ${{ secrets.ROBOT_SECRET }}
          DATA_INICIO: ${{ inputs.data_inicio }}
          DATA_FIM: ${{ inputs.data_fim }}
          WEBHOOK_URL: ${{ inputs.webhook_url || secrets.WEBHOOK_URL_SGA }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          CORRETORA_ID: ${{ inputs.corretora_id || secrets.CORRETORA_ID }}
          EXECUCAO_ID: ${{ inputs.execucao_id }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ROBOT_MODULE: eventos
        run: NODE_PATH=$PWD/.robot-deps/node_modules node scripts/robo-sga-hinova.cjs

      - name: Notificar erro ao webhook (fallback)
        if: failure()
        env:
          WEBHOOK_URL: ${{ inputs.webhook_url || secrets.WEBHOOK_URL_SGA }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          CORRETORA_ID: ${{ inputs.corretora_id || secrets.CORRETORA_ID }}
          EXECUCAO_ID: ${{ inputs.execucao_id }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -n "$WEBHOOK_URL" ] && [ -n "$CORRETORA_ID" ]; then
            curl -s -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -H "x-webhook-secret: $WEBHOOK_SECRET" \
              -d "{
                \"action\": \"error\",
                \"corretora_id\": \"$CORRETORA_ID\",
                \"execucao_id\": \"$EXECUCAO_ID\",
                \"github_run_id\": \"$GITHUB_RUN_ID\",
                \"github_run_url\": \"$GITHUB_RUN_URL\",
                \"error_message\": \"GitHub Actions falhou antes de executar o robô (erro de setup/infraestrutura). Run: $GITHUB_RUN_ID\"
              }" || echo "Falha ao notificar webhook (ignorado)"
          else
            echo "WEBHOOK_URL ou CORRETORA_ID não definidos, pulando notificação"
          fi
      
      - name: Upload screenshots de debug (se houver)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-eventos
          path: |
            erro_sga.png
            debug_sga_*.png
            debug/
          if-no-files-found: ignore
          retention-days: 3

  <title>Vangard</title>
  <meta name="description" content="Vangard - Gestora e Administradora">
  <meta name="author" content="Lovable" />

  <!-- Manifest MESMA ORIGEM: com manifest cross-origin (função Supabase), o
       Chrome resolvia start_url/scope contra o domínio errado e instalava o
       PWA como atalho de navegador (com barra de endereço). Servindo de
       /manifest.json, o app instala em modo standalone de verdade. -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#F5821F">
  <meta name="mobile-web-app-capable" content="yes">
  <!-- Favicon: aponta direto para o ícone oficial da Vangard já aprovado e
       hospedado no Storage (o mesmo usado no manifest do PWA/app instalado)
       — evita duplicar o arquivo local, que tinha ficado desatualizado
       (versão antiga/rascunho do ícone). -->
  <link rel="icon" href="https://mnoczwmqgignmylbvpgp.supabase.co/storage/v1/object/public/app-config/app-icon/icon-512-1783688134869.png" sizes="any">
  <link rel="icon" type="image/png" sizes="192x192" href="https://mnoczwmqgignmylbvpgp.supabase.co/storage/v1/object/public/app-config/app-icon/icon-192-1783688134869.png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

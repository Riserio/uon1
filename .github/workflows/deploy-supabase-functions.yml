name: Deploy Supabase Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: mnoczwmqgignmylbvpgp
    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest
        env:
          # supabase/setup-cli resolve a versao "latest" chamando a API do
          # GitHub sem autenticacao (limite de 60 req/h por IP do runner
          # compartilhado) — isso estava estourando com
          # "Failed to resolve latest Supabase CLI release: rate limit
          # exceeded". Passando o GITHUB_TOKEN do proprio workflow sobe o
          # limite pra 5000 req/h e resolve.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy edge functions (API Hinova + base)
        run: |
          set -e
          for fn in \
            importar-api-hinova \
            agregar-estudo-base \
            scheduler-base-hinova \
            disparar-sga-workflow \
            disparar-mgf-workflow \
            disparar-github-workflow \
            scheduler-sga-hinova \
            scheduler-mgf-hinova \
            scheduler-cobranca-hinova \
                        gerar-resumo-cobranca \
                                    gerar-resumo-geral \
            verify-metodo-seguranca; do
            echo "== deploy $fn =="
            supabase functions deploy "$fn" --project-ref "$PROJECT_REF" || echo "FALHOU: $fn"
          done

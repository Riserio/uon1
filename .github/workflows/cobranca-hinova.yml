name: Cobrança Hinova - Importação Automática

on:
  # Agendamento diário às 09:00 (horário de Brasília = 12:00 UTC)
  schedule:
    - cron: '0 12 * * *'
  
  # Permite execução manual pelo GitHub ou via Edge Function
  workflow_dispatch:
    inputs:
      corretora_id:
        description: 'ID da associação (corretora)'
        required: false
        type: string
      execucao_id:
        description: 'ID do registro de execução no banco'
        required: false
        type: string
      hinova_url:
        description: 'URL do portal Hinova (dinâmico por associação)'
        required: false
        type: string
      hinova_user:
        description: 'Usuário do portal (dinâmico por associação)'
        required: false
        type: string
      hinova_pass:
        description: 'Senha do portal (dinâmico por associação)'
        required: false
        type: string
      hinova_codigo_cliente:
        description: 'Código do cliente (dinâmico por associação)'
        required: false
        type: string
      hinova_layout:
        description: 'Layout do relatório (dinâmico por associação)'
        required: false
        type: string

jobs:
  importar-cobranca:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Instalar dependências
        run: |
          npm install playwright axios xlsx
          npx playwright install chromium --with-deps
      
      - name: Atualizar status no banco (início)
        if: ${{ github.event.inputs.execucao_id != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          EXECUCAO_ID: ${{ github.event.inputs.execucao_id }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          curl -X PATCH "${SUPABASE_URL}/rest/v1/cobranca_automacao_execucoes?id=eq.${EXECUCAO_ID}" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"github_run_id\": \"${GITHUB_RUN_ID}\", \"github_run_url\": \"https://github.com/${{ github.repository }}/actions/runs/${GITHUB_RUN_ID}\", \"etapa_atual\": \"login\"}"
      
      - name: Executar robô de cobrança
        env:
          # Priorizar inputs dinâmicos sobre secrets fixos (permite múltiplas associações)
          HINOVA_URL: ${{ github.event.inputs.hinova_url || secrets.HINOVA_URL }}
          HINOVA_USER: ${{ github.event.inputs.hinova_user || secrets.HINOVA_USER }}
          HINOVA_PASS: ${{ github.event.inputs.hinova_pass || secrets.HINOVA_PASS }}
          HINOVA_CODIGO_CLIENTE: ${{ github.event.inputs.hinova_codigo_cliente || secrets.HINOVA_CODIGO_CLIENTE }}
          HINOVA_LAYOUT: ${{ github.event.inputs.hinova_layout || secrets.HINOVA_LAYOUT }}
          # Variáveis que sempre vêm de secrets
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          CORRETORA_ID: ${{ github.event.inputs.corretora_id || secrets.CORRETORA_ID }}
          EXECUCAO_ID: ${{ github.event.inputs.execucao_id }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/robo-cobranca-hinova.cjs
      
      - name: Atualizar status no banco (sucesso)
        if: ${{ success() && github.event.inputs.execucao_id != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          EXECUCAO_ID: ${{ github.event.inputs.execucao_id }}
        run: |
          curl -X PATCH "${SUPABASE_URL}/rest/v1/cobranca_automacao_execucoes?id=eq.${EXECUCAO_ID}" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"status\": \"sucesso\", \"finalizado_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
      
      - name: Atualizar status no banco (erro)
        if: ${{ failure() && github.event.inputs.execucao_id != '' }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          EXECUCAO_ID: ${{ github.event.inputs.execucao_id }}
        run: |
          curl -X PATCH "${SUPABASE_URL}/rest/v1/cobranca_automacao_execucoes?id=eq.${EXECUCAO_ID}" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"status\": \"erro\", \"erro\": \"Falha na execução do workflow\", \"finalizado_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
      
      - name: Upload screenshots de debug (se houver)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: |
            erro_hinova.png
            debug_hinova.png
            debug_antes_login.png
            debug_apos_login.png
            debug_filtros.png
            debug_antes_excel.png
            debug_antes_excel_tentativa.png
            debug_apos_selecao_excel.png
            debug_antes_gerar.png
            debug_apos_gerar.png
            debug_nova_aba.png
            debug_download_retry_*.png
          if-no-files-found: ignore
          retention-days: 7

name: MGF Hinova - Importação de Lançamentos

on:
  # Agendamento: dias úteis às 09:00 (horário de Brasília = 12:00 UTC)
  schedule:
    - cron: '0 12 * * 1-5'
  
  # Permite execução manual pelo GitHub ou via API
  workflow_dispatch:
    inputs:
      corretora_id:
        description: 'ID da corretora/associação'
        required: false
        type: string
      hinova_url:
        description: 'URL do portal Hinova'
        required: false
        type: string
      hinova_user:
        description: 'Usuário Hinova'
        required: false
        type: string
      hinova_pass:
        description: 'Senha Hinova'
        required: false
        type: string
      hinova_codigo_cliente:
        description: 'Código do cliente Hinova'
        required: false
        type: string
      hinova_layout:
        description: 'Layout do relatório (MGF)'
        required: false
        type: string
      hinova_relatorio_url:
        description: 'URL direta da página de relatório MGF'
        required: false
        type: string
      execucao_id:
        description: 'ID da execução no banco'
        required: false
        type: string
      webhook_url:
        description: 'URL do webhook para callback'
        required: false
        type: string

jobs:
  importar-mgf:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cache para módulos npm (economiza ~2-3 min por run)
      - name: Cache dependências npm
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-mgf-${{ hashFiles('package-lock.json') }}-v1
          restore-keys: |
            ${{ runner.os }}-npm-mgf-

      # Cache para binários do Playwright/Chromium (economiza ~3-5 min por run)
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium-${{ hashFiles('package-lock.json') }}-v1
          restore-keys: |
            ${{ runner.os }}-playwright-chromium-

      - name: Instalar dependências
        if: steps.npm-cache.outputs.cache-hit != 'true'
        run: npm install playwright axios xlsx

      - name: Instalar Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      - name: Instalar dependências do sistema (se browser em cache)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      
      - name: Executar robô MGF
        env:
          HINOVA_URL: ${{ inputs.hinova_url || secrets.HINOVA_URL }}
          HINOVA_CODIGO_CLIENTE: ${{ inputs.hinova_codigo_cliente || secrets.HINOVA_CODIGO_CLIENTE }}
          HINOVA_USER: ${{ inputs.hinova_user || secrets.HINOVA_USER }}
          HINOVA_PASS: ${{ inputs.hinova_pass || secrets.HINOVA_PASS }}
          HINOVA_LAYOUT: ${{ inputs.hinova_layout || secrets.HINOVA_LAYOUT_MGF || secrets.HINOVA_LAYOUT }}
          HINOVA_RELATORIO_URL: ${{ inputs.hinova_relatorio_url }}
          WEBHOOK_URL: ${{ inputs.webhook_url || secrets.WEBHOOK_URL_MGF || secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          CORRETORA_ID: ${{ inputs.corretora_id || secrets.CORRETORA_ID }}
          EXECUCAO_ID: ${{ inputs.execucao_id }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/robo-mgf-hinova.cjs

      - name: Notificar erro ao webhook (fallback)
        if: failure()
        env:
          WEBHOOK_URL: ${{ inputs.webhook_url || secrets.WEBHOOK_URL_MGF || secrets.WEBHOOK_URL }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          CORRETORA_ID: ${{ inputs.corretora_id || secrets.CORRETORA_ID }}
          EXECUCAO_ID: ${{ inputs.execucao_id }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -n "$WEBHOOK_URL" ] && [ -n "$CORRETORA_ID" ]; then
            curl -s -X POST "$WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              -H "x-webhook-secret: $WEBHOOK_SECRET" \
              -d "{
                \"action\": \"error\",
                \"corretora_id\": \"$CORRETORA_ID\",
                \"execucao_id\": \"$EXECUCAO_ID\",
                \"github_run_id\": \"$GITHUB_RUN_ID\",
                \"github_run_url\": \"$GITHUB_RUN_URL\",
                \"error_message\": \"GitHub Actions falhou antes de executar o robô (erro de setup/infraestrutura). Run: $GITHUB_RUN_ID\"
              }" || echo "Falha ao notificar webhook (ignorado)"
          else
            echo "WEBHOOK_URL ou CORRETORA_ID não definidos, pulando notificação"
          fi
      
      - name: Upload screenshots de debug (se houver)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-mgf
          path: |
            erro_mgf.png
            debug_mgf_*.png
            debug/
          if-no-files-found: ignore
          retention-days: 3
